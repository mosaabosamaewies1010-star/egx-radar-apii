services:
  - type: web
    name: egx-radar-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -c "from app import create_app, db; app = create_app(); app.app_context().__enter__(); db.create_all(); print('DB tables created')" && gunicorn run:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: egx-radar-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "0"
      - key: CORS_ORIGINS
        # Update this after Vercel gives you the real URL
        value: https://egx-radar.vercel.app
      - key: BOT_API_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.12.0"

databases:
  - name: egx-radar-db
    plan: free
