name: EGX Daily Scan

on:
  schedule:
    # 13:30 UTC = 15:30 Cairo (UTC+2) — 1 hour after EGX closes at 14:30
    - cron: '30 13 * * 0,1,2,3,4'
  workflow_dispatch:

jobs:
  trigger-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Trigger daily pipeline
        run: |
          RESPONSE=$(curl -s -o response.json -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_API_URL }}/api/admin/trigger-scan" \
            -H "X-API-Key: ${{ secrets.BOT_API_KEY }}" \
            -H "Content-Type: application/json")
          echo "HTTP status: $RESPONSE"
          cat response.json
          if [ "$RESPONSE" != "200" ]; then
            echo "Trigger failed with status $RESPONSE"
            exit 1
          fi

      - name: Wait for pipeline to complete
        run: sleep 300

      - name: Fetch health data
        run: |
          curl -sf "${{ secrets.RENDER_API_URL }}/api/admin/health" -o health.json
          curl -sf "${{ secrets.RENDER_API_URL }}/api/admin/health-detail?type=signals_today&limit=5" -o detail.json
          echo "=== health.json ==="
          cat health.json
          echo ""
          echo "=== detail.json ==="
          cat detail.json

      - name: Send Telegram report
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 - <<'PYEOF'
          import os, json, sys
          from urllib import request as ureq
          from datetime import date

          TOKEN   = os.environ.get("TELEGRAM_TOKEN", "")
          CHAT_ID = os.environ.get("TELEGRAM_CHAT_ID", "")

          with open("health.json") as f:
              health = json.load(f)
          with open("detail.json") as f:
              detail = json.load(f)

          scored    = health.get("scanner",       {}).get("scored_today", 0)
          sra_open  = health.get("signals",       {}).get("sra_open", 0)
          sig_today = health.get("signals",       {}).get("today", 0)
          wins      = health.get("performance",   {}).get("wins", 0)
          losses    = health.get("performance",   {}).get("losses", 0)
          win_rate  = health.get("performance",   {}).get("win_rate")
          kb_size   = health.get("knowledge_base",{}).get("size", 0)
          regime    = (health.get("regime") or {}).get("regime", "N/A")
          conf      = (health.get("regime") or {}).get("confidence")

          today_str = date.today().strftime("%Y-%m-%d")
          r_emoji   = {"BULL":"🟢","BEAR":"🔴","NEUTRAL":"🟡","CAUTION":"⚠️"}.get(regime, "🌍")
          win_str   = f"{win_rate}%" if win_rate is not None else "N/A"
          conf_str  = f" ({conf:.0f}%)" if conf else ""

          if scored == 0:
              msg = (
                  f"❌ <b>EGX Radar — {today_str}</b>\n\n"
                  "تحذير: لم يتم فحص أي أسهم اليوم\n"
                  "يرجى مراجعة السجلات على Render"
              )
          else:
              items = detail.get("items", [])
              sig_lines = []
              for s in items:
                  sym   = s.get("symbol", "?")
                  name  = s.get("name_ar") or ""
                  grade = s.get("grade") or ""
                  entry = s.get("entry")
                  tp1   = s.get("tp1")
                  sl    = s.get("sl")
                  rr    = s.get("rr")
                  parts = []
                  if entry: parts.append(f"دخول {entry:.2f}")
                  if tp1:   parts.append(f"TP {tp1:.2f}")
                  if sl:    parts.append(f"SL {sl:.2f}")
                  if rr:    parts.append(f"RR {rr:.1f}")
                  d_str     = " | ".join(parts)
                  grade_tag = f" [{grade}]" if grade else ""
                  sig_lines.append(f"• <b>{sym}</b>{grade_tag} {name}\n  {d_str}")

              if sig_lines:
                  sig_block = (
                      f"\n🎯 <b>إشارات SRA اليوم ({sig_today})</b>\n"
                      "━━━━━━━━━━━━━\n"
                      + "\n".join(sig_lines) + "\n"
                  )
              elif sig_today > 0:
                  sig_block = f"\n🎯 إشارات SRA اليوم: <b>{sig_today}</b>\n"
              else:
                  sig_block = "\n📭 لا توجد إشارات SRA اليوم\n"

              msg = (
                  f"📡 <b>EGX Radar — {today_str}</b>\n\n"
                  f"📊 فُحص <b>{scored}</b> سهم | {r_emoji} السوق: <b>{regime}</b>{conf_str}"
                  f"{sig_block}\n"
                  f"📈 SRA مفتوحة: <b>{sra_open}</b>\n"
                  f"✅ رابحة: <b>{wins}</b> | ❌ خاسرة: <b>{losses}</b> | 🏆 الفوز: <b>{win_str}</b>\n"
                  f"📚 Knowledge Base: <b>{kb_size}</b> صفقة"
              )

          payload = json.dumps({"chat_id": CHAT_ID, "text": msg, "parse_mode": "HTML"}).encode()
          req = ureq.Request(
              f"https://api.telegram.org/bot{TOKEN}/sendMessage",
              data=payload,
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          try:
              resp = ureq.urlopen(req, timeout=10)
              print("Telegram message sent, status:", resp.status)
          except Exception as e:
              print(f"Telegram send failed: {e}", file=sys.stderr)
              sys.exit(1)
          PYEOF

      - name: Send failure alert
        if: failure()
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 - <<'PYEOF'
          import os, json
          from urllib import request as ureq
          from datetime import date

          TOKEN   = os.environ.get("TELEGRAM_TOKEN", "")
          CHAT_ID = os.environ.get("TELEGRAM_CHAT_ID", "")
          today   = date.today().strftime("%Y-%m-%d")

          msg = (
              f"🚨 <b>EGX Radar — {today}</b>\n\n"
              "فشل الـ pipeline اليومي\n"
              "يرجى مراجعة GitHub Actions للتفاصيل"
          )
          payload = json.dumps({"chat_id": CHAT_ID, "text": msg, "parse_mode": "HTML"}).encode()
          req = ureq.Request(
              f"https://api.telegram.org/bot{TOKEN}/sendMessage",
              data=payload,
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          ureq.urlopen(req, timeout=10)
          PYEOF
