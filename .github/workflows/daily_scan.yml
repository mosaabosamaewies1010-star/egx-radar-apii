name: EGX Daily Scan

on:
  schedule:
    # 13:30 UTC = 15:30 Cairo (UTC+2) — 1 hour after EGX closes at 14:30
    - cron: '30 13 * * 0,1,2,3,4'
  workflow_dispatch:

jobs:
  trigger-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Trigger daily pipeline
        id: trigger
        run: |
          RESPONSE=$(curl -s -o response.json -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_API_URL }}/api/admin/trigger-scan" \
            -H "X-API-Key: ${{ secrets.BOT_API_KEY }}" \
            -H "Content-Type: application/json")
          echo "status=$RESPONSE" >> $GITHUB_OUTPUT
          echo "HTTP status: $RESPONSE"
          cat response.json
          if [ "$RESPONSE" != "200" ]; then
            echo "trigger_failed=true" >> $GITHUB_OUTPUT
          fi

      - name: Wait for pipeline to complete
        run: sleep 300

      - name: Check health and send alert
        run: |
          HEALTH=$(curl -s "${{ secrets.RENDER_API_URL }}/api/admin/health")
          echo "$HEALTH"

          SCORED=$(echo "$HEALTH" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['scanner']['scored_today'])" 2>/dev/null || echo "0")
          SRA_OPEN=$(echo "$HEALTH" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['signals']['sra_open'])" 2>/dev/null || echo "0")
          REGIME=$(echo "$HEALTH" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['regime']['regime'] if d['regime'] else 'N/A')" 2>/dev/null || echo "N/A")
          WIN_RATE=$(echo "$HEALTH" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['performance']['win_rate'] or 'N/A')" 2>/dev/null || echo "N/A")

          DATE=$(date '+%Y-%m-%d')

          if [ "$SCORED" -gt "0" ]; then
            MSG="✅ EGX Radar — $DATE%0A%0Aتم الفحص اليومي بنجاح%0A%0A📊 أسهم تم فحصها: $SCORED%0A📈 إشارات SRA مفتوحة: $SRA_OPEN%0A🌍 حالة السوق: $REGIME%0A🎯 معدل الفوز: $WIN_RATE%%"
          else
            MSG="❌ EGX Radar — $DATE%0A%0Aتحذير: لم يتم فحص أي أسهم اليوم%0Aيرجى مراجعة السجلات على Render"
          fi

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=$MSG&parse_mode=HTML"

      - name: Send failure alert
        if: failure()
        run: |
          DATE=$(date '+%Y-%m-%d')
          MSG="🚨 EGX Radar — $DATE%0A%0Aفشل الـ pipeline اليومي%0Aيرجى مراجعة GitHub Actions للتفاصيل"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=$MSG"
