name: EGX Keep-Alive Ping

on:
  schedule:
    # كل 10 دقايق من 8 صباحاً لـ 4 عصراً UTC (10ص - 6م بتوقيت القاهرة) الأحد للخميس
    - cron: '0,10,20,30,40,50 8-16 * * 0,1,2,3,4'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping backend health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 90 \
            "https://egx-radar-api.onrender.com/api/market/regime" || echo "000")
          echo "Status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "Backend is up and responding."
          else
            echo "Warning: backend returned $STATUS (may still be warming up — not a failure)"
          fi
